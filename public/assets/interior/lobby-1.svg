<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg-lobby" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1822"/>
      <stop offset="100%" stop-color="#0a0812"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg-lobby)"/>
  <!-- Grand entrance -->
  <rect x="250" y="30" width="300" height="450" fill="#2a2835"/>
  <!-- Double doors -->
  <rect x="260" y="40" width="135" height="440" rx="4" fill="#3a3845" stroke="#c19a6b" stroke-width="2"/>
  <rect x="405" y="40" width="135" height="440" rx="4" fill="#3a3845" stroke="#c19a6b" stroke-width="2"/>
  <!-- Door handles -->
  <circle cx="390" cy="250" r="5" fill="#c19a6b"/>
  <circle cx="410" cy="250" r="5" fill="#c19a6b"/>
  <!-- Archway above -->
  <path d="M250 40 Q400 0 550 40" fill="none" stroke="#c19a6b" stroke-width="3"/>
  <!-- Reception desk -->
  <rect x="580" y="280" width="180" height="100" rx="8" fill="#2a2835" stroke="#c19a6b" stroke-width="1.5"/>
  <rect x="590" y="290" width="80" height="80" rx="4" fill="#3a3845"/>
  <!-- Desk lamp -->
  <rect x="710" y="310" width="6" height="30" fill="#c19a6b"/>
  <ellipse cx="713" cy="305" rx="15" ry="8" fill="#d4a574"/>
  <!-- Floor shine -->
  <rect x="0" y="480" width="800" height="120" fill="#1a1822"/>
  <ellipse cx="400" cy="520" rx="250" ry="15" fill="#2a2835" opacity="0.5"/>
  <!-- Title -->
  <text x="400" y="580" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#c19a6b" letter-spacing="3">HOTEL LOBBY RECEPTION</text>
  <text x="770" y="40" text-anchor="end" font-family="Georgia, serif" font-size="10" fill="#c19a6b" opacity="0.5" letter-spacing="2">AHS INTERIOR</text>
</svg>
