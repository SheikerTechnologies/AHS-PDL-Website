<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg-after" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2520"/>
      <stop offset="100%" stop-color="#1a1512"/>
    </linearGradient>
    <linearGradient id="accent-gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c19a6b"/>
      <stop offset="100%" stop-color="#d4a574"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg-after)"/>
  <!-- Window -->
  <rect x="250" y="100" width="300" height="250" rx="8" fill="#3a322c" stroke="#c19a6b" stroke-width="3"/>
  <rect x="260" y="110" width="280" height="230" rx="4" fill="#4a3f36"/>
  <line x1="400" y1="110" x2="400" y2="340" stroke="#3a322c" stroke-width="2"/>
  <line x1="260" y1="225" x2="540" y2="225" stroke="#3a322c" stroke-width="2"/>
  <!-- Sofa -->
  <rect x="220" y="370" width="360" height="120" rx="20" fill="#4a3f36"/>
  <rect x="240" y="360" width="320" height="60" rx="15" fill="#5a4f46"/>
  <!-- Cushions -->
  <rect x="245" y="365" width="70" height="50" rx="10" fill="#c19a6b" opacity="0.8"/>
  <rect x="325" y="365" width="70" height="50" rx="10" fill="#8a7a6b" opacity="0.8"/>
  <rect x="405" y="365" width="70" height="50" rx="10" fill="#c19a6b" opacity="0.6"/>
  <rect x="485" y="365" width="70" height="50" rx="10" fill="#8a7a6b" opacity="0.8"/>
  <!-- Coffee table -->
  <rect x="330" y="500" width="140" height="15" rx="5" fill="#8a7a6b"/>
  <rect x="340" y="515" width="10" height="20" fill="#6a5f56"/>
  <rect x="450" y="515" width="10" height="20" fill="#6a5f56"/>
  <!-- Lamp -->
  <rect x="570" y="250" width="8" height="110" fill="#c19a6b"/>
  <ellipse cx="574" cy="245" rx="20" ry="12" fill="#d4a574" opacity="0.9"/>
  <ellipse cx="574" cy="240" rx="12" ry="8" fill="#e8c88a" opacity="0.5"/>
  <!-- Floor line -->
  <rect x="0" y="540" width="800" height="60" fill="#1a1512"/>
  <!-- Title -->
  <text x="400" y="580" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#c19a6b" letter-spacing="3">MODERN LIVING ROOM</text>
  <!-- Badge -->
  <rect x="30" y="30" width="100" height="30" rx="15" fill="#c19a6b"/>
  <text x="80" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1512" font-weight="bold" letter-spacing="2">AFTER</text>
  <!-- AHS brand -->
  <text x="770" y="40" text-anchor="end" font-family="Georgia, serif" font-size="10" fill="#c19a6b" opacity="0.5" letter-spacing="2">AHS INTERIOR</text>
</svg>
