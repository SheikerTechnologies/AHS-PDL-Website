<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg-bath" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3035"/>
      <stop offset="100%" stop-color="#1a2025"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg-bath)"/>
  <!-- Marble wall -->
  <rect x="40" y="40" width="720" height="480" fill="#3a4045" opacity="0.5"/>
  <line x1="40" y1="120" x2="760" y2="120" stroke="#4a5055" stroke-width="1" opacity="0.3"/>
  <line x1="40" y1="200" x2="760" y2="200" stroke="#4a5055" stroke-width="1" opacity="0.3"/>
  <line x1="40" y1="280" x2="760" y2="280" stroke="#4a5055" stroke-width="1" opacity="0.3"/>
  <!-- Mirror -->
  <rect x="280" y="60" width="240" height="200" rx="20" fill="#5a6065" stroke="#c19a6b" stroke-width="3"/>
  <rect x="290" y="70" width="220" height="180" rx="15" fill="#6a7075"/>
  <ellipse cx="400" cy="160" rx="25" ry="35" fill="#7a8085" opacity="0.3"/>
  <!-- Vanity -->
  <rect x="240" y="260" width="320" height="100" rx="6" fill="#3a4045"/>
  <rect x="250" y="270" width="70" height="80" rx="3" fill="#4a5055"/>
  <rect x="340" y="270" width="120" height="80" rx="3" fill="#4a5055"/>
  <rect x="480" y="270" width="70" height="80" rx="3" fill="#4a5055"/>
  <!-- Sink basin -->
  <ellipse cx="400" cy="300" rx="45" ry="15" fill="#6a7075"/>
  <!-- Bathtub -->
  <rect x="150" y="400" width="500" height="80" rx="40" fill="#3a4045" stroke="#5a6065" stroke-width="2"/>
  <rect x="160" y="410" width="480" height="60" rx="30" fill="#2a3035"/>
  <!-- Faucet -->
  <rect x="380" y="370" width="40" height="20" rx="5" fill="#c19a6b"/>
  <!-- Floor -->
  <rect x="0" y="530" width="800" height="70" fill="#1a2025"/>
  <text x="400" y="580" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#c19a6b" letter-spacing="3">LUXURY BATHROOM</text>
  <text x="770" y="40" text-anchor="end" font-family="Georgia, serif" font-size="10" fill="#c19a6b" opacity="0.5" letter-spacing="2">AHS INTERIOR</text>
</svg>
